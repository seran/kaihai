name: Deploy

# Fires after the CI workflow finishes on the `deploy` branch.
# Deploys only when CI concluded successfully.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   RAILS_MASTER_KEY        – contents of config/master.key
#   KAMAL_SSH_PRIVATE_KEY   – private SSH key authorized on the deploy host
#   KAMAL_DEPLOY_HOST       – hostname/IP of the production server
#
# Provided automatically by GitHub (no setup needed):
#   GITHUB_TOKEN            – used to push the image to ghcr.io
#   github.repository_owner – used as the GHCR username and image namespace
on:
  workflow_run:
    workflows: [ CI ]
    branches: [ deploy ]
    types: [ completed ]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write

    env:
      KAMAL_REGISTRY_USERNAME: ${{ github.repository_owner }}
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      KAMAL_DEPLOY_HOST: ${{ secrets.KAMAL_DEPLOY_HOST }}
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}

    steps:
      - name: Checkout code at the commit CI validated
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.KAMAL_SSH_PRIVATE_KEY }}

      - name: Trust deploy hosts
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf "Host *\n  StrictHostKeyChecking accept-new\n  UserKnownHostsFile ~/.ssh/known_hosts\n" >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Write Rails master key
        run: |
          install -m 600 /dev/null config/master.key
          printf '%s' "${{ secrets.RAILS_MASTER_KEY }}" > config/master.key

      - name: Deploy with Kamal
        run: bin/kamal deploy